kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
- role: worker
  # Envoyのデータプレーンをこのノードに固定し(EnvoyProxyのnodeSelector参照)、
  # NodePort(30080/30443)をホストの80/443に公開する。
  # クロスノードのNodePort転送がkindでは不安定なため、Pod同居ノードで受ける。
  labels:
    ingress-ready: "true"
  extraPortMappings:
  - containerPort: 30080
    hostPort: 80
    protocol: TCP
  - containerPort: 30443
    hostPort: 443
    protocol: TCP
- role: worker
