app:
  # app-backendプラグインがフロントエンドを同一オリジンで配信する
  baseUrl: http://backstage.localhost

backend:
  baseUrl: http://backstage.localhost
  listen: ':7007'
  cors:
    origin: http://backstage.localhost
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

# Scaffolder(PR作成)とカタログのワイルドカードlocation解決に使う
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  providers:
    guest:
      # 学習環境のためproductionビルドでもゲストログインを許可する
      dangerouslyAllowOutsideDevelopment: true

techdocs:
  builder: 'local'
  generator:
    # コンテナ内にDockerがないためローカル生成にする
    runIn: 'local'
  publisher:
    type: 'local'

catalog:
  locations:
    # サンプルの組織データ(guestsグループ)は所有者参照のために残す
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]
    # 稼働中のワークロードをComponentとして登録する。
    # ワイルドカードにより、Golden PathのPRマージで増えたcatalog/*.yamlも自動登録される
    # (個人アカウントのリポジトリはGitHub org discoveryが使えないためglob locationで代替)
    - type: url
      target: https://github.com/degwinthegreat/k8s_learning/blob/main/catalog/*.yaml
    # Golden PathのSoftware Template
    - type: url
      target: https://github.com/degwinthegreat/k8s_learning/blob/main/templates/workload/template.yaml
      rules:
        - allow: [Template]

# Roadie ArgoCDプラグイン: クラスター内のargocd-serverからアプリの同期状態を取得する
argocd:
  appLocatorMethods:
    - type: 'config'
      instances:
        - name: argocd
          url: https://argocd-server.argocd.svc.cluster.local
          token: ${ARGOCD_AUTH_TOKEN}
