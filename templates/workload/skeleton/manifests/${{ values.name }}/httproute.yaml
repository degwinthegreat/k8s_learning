apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.name }}
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - ${{ values.name }}.localhost
  rules:
    - backendRefs:
        - name: ${{ values.name }}
          port: 80
